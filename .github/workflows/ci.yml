name: NeuroRAM CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend modules
        run: |
          python -m py_compile api_server.py neuroram/backend/os/system_monitor.py neuroram/backend/dbms/database.py neuroram/backend/daa/risk_analyzer.py neuroram/backend/daa/stability_index.py

      - name: Run backend unit tests
        run: pytest -q tests

      - name: Run backend checklist
        run: python -m tests.run_checklist

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Type-check frontend
        run: npx tsc -b
